# Scheduled news ingestion.
#
# GitHub Actions limits (free tier):
#   - Private repos: 2 000 min/month.  Running every 6h ~ 120 runs x ~3 min
#     = 360 min/month (safe).
#   - Public repos: unlimited on GitHub-hosted runners.
#   - Scheduled workflows are auto-disabled after 60 days of no repo activity
#     (no push / PR).  Re-enable manually or add a keep-alive commit if needed.

name: Scheduled Ingest

on:
  schedule:
    # Every 6 hours (at :17 past the hour) — stays well within free-tier limits
    - cron: '17 */6 * * *'
  workflow_dispatch:

concurrency:
  group: scheduled-ingest
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: ${{ secrets.DATABASE_URL != '' }}
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      API_TOKEN: ${{ secrets.API_TOKEN }}
      GDELT_TIMESPAN: 7d
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Initialize DB schema
        run: python -m app.init_db
      - name: Ingest news once
        run: python -m app.ingest_once
