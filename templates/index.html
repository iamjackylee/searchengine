{% extends "base.html" %}

{% block title %}SearchEngine — Your Personal Search{% endblock %}

{% block body %}
<div class="home-wrapper">
  <div class="home-brand">
    <h1>
      <span class="s">S</span>earch<span class="e1">E</span>ngin<span class="a">e</span>
    </h1>
    <div class="tagline">Your personal AI news search engine</div>
  </div>

  <form class="search-form search-box" method="get" action="/search">
    <div class="search-input-wrap">
      <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" name="q" value="{{ q }}" placeholder="Search AI news..." autocomplete="off"/>
      <button type="button" class="clear-btn" aria-label="Clear">&times;</button>
    </div>

    <div class="home-filters">
      <select name="source">
        <option value="">All sources</option>
        {% for src in sources %}
        <option value="{{ src.name }}" {% if src.name == source %}selected{% endif %}>{{ src.name }}</option>
        {% endfor %}
      </select>
      <input type="number" name="since_hours" value="{{ since_hours }}" min="1" max="720" title="Hours lookback"/>
    </div>

    <div class="home-actions">
      <button type="submit" class="btn btn-primary">Search</button>
    </div>
  </form>

  <footer class="footer" style="position:fixed;bottom:0;left:0;right:0;">
    Self-hosted search engine &middot; No third-party search APIs
  </footer>
</div>
{% endblock %}
