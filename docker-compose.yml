services:
  postgres:
    image: postgres:16
    container_name: ai_news_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_news
      POSTGRES_USER: ai_news
      POSTGRES_PASSWORD: ai_news
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_news -d ai_news"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
